version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: chore
      include: scope
    groups:
      root-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
      - client
    commit-message:
      prefix: chore
      include: scope
    groups:
      client-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
      - server
    commit-message:
      prefix: chore
      include: scope
    groups:
      server-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /ai-ml
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
      - ai-ml
    commit-message:
      prefix: chore
      include: scope
    groups:
      ai-ml-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - automated
      - ci
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions-minor-and-patch:
        update-types:
          - minor
          - patch
