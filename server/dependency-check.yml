name: Architectural Validation

on:
  pull_request:
    paths:
      - 'server/src/**'
      - 'client/src/**'
      - '.dependency-cruiser.js'
  push:
    branches:
      - main
      - develop

jobs:
  dependency-cruiser:
    name: Circular Dependency & Architecture Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run dependency-cruiser (server)
        working-directory: server
        run: npm run depcruise:validate

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install dependency-cruiser in client
        working-directory: client
        run: npm install --save-dev dependency-cruiser

      - name: Run dependency-cruiser (client)
        working-directory: client
        run: npx depcruise src --config ../.dependency-cruiser.js --output-type err-long

      - name: Upload dependency graph as artifact
        if: always()
        working-directory: server
        run: |
          npm install -g graphviz 2>/dev/null || apt-get install -y graphviz
          npm run depcruise:graph || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-graph
          path: server/dependency-graph.svg
          retention-days: 7