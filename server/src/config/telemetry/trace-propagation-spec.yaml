# =========================================================================================
# 🔭 Global Enterprise Distributed Tracing & OTel Context Propagation Specification
# Framework Ref: #1206
# Version: 1.0.0
# Core Paradigm: W3C Trace Context Standard Enforcement
# =========================================================================================

executive_summary: >
  In a distributed microservice architecture, observability is not an afterthought; it is 
  the nervous system of the platform. This specification mandates the strict implementation 
  of the W3C Trace Context standard across all internal network boundaries. By ensuring 
  that every request, whether gRPC, REST, or message-queue driven, carries an immutable 
  Trace-ID, we eliminate observability silos and enable end-to-end latency profiling.

# -----------------------------------------------------------------------------------------
# SECTION 1: W3C TRACE CONTEXT STANDARDS
# -----------------------------------------------------------------------------------------
context_propagation_rules:
  description: "Global mandate for propagating trace context across service boundaries."
  
  header_specification:
    traceparent:
      required: true
      format: "version-traceid-parentid-flags"
      description: "Standard W3C header for Trace-ID continuity."
      
    tracestate:
      required: false
      format: "key=value"
      description: "Vendor-specific telemetry information (e.g., Datadog, Jaeger, NewRelic)."

  propagation_mechanisms:
    - protocol: "HTTP/1.1"
      injection_point: "Request Interceptor (Gateway Layer)"
      extraction_point: "Middleware (Application Layer)"
    - protocol: "gRPC"
      injection_point: "Metadata Map (gRPC Client Interceptor)"
      extraction_point: "Metadata Map (gRPC Server Interceptor)"
    - protocol: "Kafka/RabbitMQ"
      injection_point: "Message Headers (Kafka Record Header)"
      extraction_point: "Message Consumption Handler"

# -----------------------------------------------------------------------------------------
# SECTION 2: SAMPLING & DATA QUALITY GOVERNANCE
# -----------------------------------------------------------------------------------------
tail_based_sampling_matrix:
  description: "Intelligent sampling strategy to balance visibility and cost."
  
  global_policy:
    default_sampling_rate: 0.05 # 5% baseline
    
  sampling_priorities:
    tier_1_errors:
      condition: "status_code >= 500"
      sampling_rate: 1.0 # Capture 100% of errors
      action: "RETAIN_FOR_30_DAYS"
      
    tier_2_latency:
      condition: "duration_ms > 500"
      sampling_rate: 1.0 # Capture 100% of high-latency traces
      action: "RETAIN_FOR_14_DAYS"
      
    tier_3_normal:
      condition: "duration_ms <= 500"
      sampling_rate: 0.05 # Random sample for performance baselining
      action: "RETAIN_FOR_7_DAYS"

# -----------------------------------------------------------------------------------------
# SECTION 3: EXPORTER & TELEMETRY BACKEND CONFIGURATION
# -----------------------------------------------------------------------------------------
telemetry_exporters:
  datadog:
    enabled: true
    endpoint: "https://trace.agent.datadoghq.com"
    protocol: "otlp_grpc"
    batch_size: 1024
    flush_interval_ms: 5000

  jaeger:
    enabled: true
    endpoint: "http://jaeger-collector:4317"
    protocol: "grpc"

# -----------------------------------------------------------------------------------------
# SECTION 4: DISTRIBUTED TRACING INTEGRITY AUDIT
# -----------------------------------------------------------------------------------------
audit_checkpoints:
  - "validate_traceparent_format_on_ingress"
  - "ensure_trace_context_propagation_through_kafka_queues"
  - "enforce_span_tag_standardization (env, service, version, tenant_id)"
  - "check_span_duration_sanity (alert if duration < 0)"

