version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - skillssphere-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - skillssphere-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/skillssphere
      - REDIS_URL=redis://redis:6379
      - INTERVIEW_AI_URL=http://interview-ai-service:8000
    env_file:
      - ./server/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skillssphere-network

  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server
    networks:
      - skillssphere-network

  interview-ai-service:
    build:
      context: ./interview-ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./interview-ai-service/.env
    networks:
      - skillssphere-network

volumes:
  mongodb_data:

networks:
  skillssphere-network:
    driver: bridge
